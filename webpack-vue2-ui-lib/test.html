<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI 组件库测试 - webpack-vue2-ui-lib</title>
  <link rel="stylesheet" href="./lib/webpack-vue2-ui-lib.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f0f2f5;
      color: #303133;
      line-height: 1.6;
    }

    /* ====== SPA 布局 ====== */
    #app {
      display: flex;
      min-height: 100vh;
    }

    .layout-wrap {
      display: flex;
      width: 100%;
      min-height: 100vh;
    }

    .main-area {
      flex: 1;
      margin-left: 220px;  /* 与 ui-menu 展开宽度一致 */
      padding: 0;
      transition: margin-left 0.3s;
    }
    /* 菜单折叠时主区域收缩 */
    .menu-collapsed .main-area {
      margin-left: 64px;
    }

    .page-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px 60px;
    }

    /* ====== Header ====== */
    .page-header {
      background: linear-gradient(135deg, #409eff 0%, #337ecc 100%);
      color: #fff;
      padding: 28px 32px;
      border-radius: 12px;
      margin-bottom: 28px;
    }
    .page-header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .page-header p {
      opacity: 0.85;
      font-size: 14px;
    }

    /* ====== Section ====== */
    .test-section {
      background: #fff;
      border-radius: 10px;
      padding: 24px 28px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .test-section h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 6px;
      padding-left: 10px;
      border-left: 3px solid #409eff;
    }
    .test-section .desc {
      font-size: 13px;
      color: #909399;
      margin-bottom: 16px;
    }

    .demo-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      padding: 16px;
      background: #fafbfc;
      border: 1px solid #ebeef5;
      border-radius: 8px;
      margin-bottom: 14px;
    }
    .demo-row--col {
      flex-direction: column;
      align-items: stretch;
      max-width: 480px;
    }

    .demo-label {
      font-size: 12px;
      color: #909399;
      margin-right: 8px;
      white-space: nowrap;
    }

    .output {
      font-size: 13px;
      color: #606266;
      font-family: Consolas, "Courier New", monospace;
    }
    .output code {
      color: #409eff;
      background: #ecf5ff;
      padding: 1px 6px;
      border-radius: 3px;
    }

    .event-log {
      margin-top: 8px;
      padding: 10px 14px;
      background: #1d1e2c;
      border-radius: 6px;
      max-height: 160px;
      overflow-y: auto;
    }
    .event-log p {
      font-size: 12px;
      color: #a6accd;
      font-family: Consolas, monospace;
      line-height: 1.8;
    }

    .form-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .form-label {
      width: 70px;
      text-align: right;
      font-size: 13px;
      color: #606266;
      flex-shrink: 0;
    }

    .status-badge { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: 500; }
    .status-badge--on  { background: #e1f3d8; color: #67c23a; }
    .status-badge--off { background: #fef0f0; color: #f56c6c; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
    th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid #ebeef5; }
    th { background: #f8f9fc; font-weight: 600; }
    td:first-child { color: #f56c6c; font-family: Consolas, monospace; }

    .current-route {
      font-size: 13px;
      color: #409eff;
      margin-top: 12px;
      padding: 8px 12px;
      background: #ecf5ff;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div id="app">
  <div :class="{ 'layout-wrap': true, 'menu-collapsed': menuCollapsed }">
    <!-- 左侧菜单 -->
    <ui-menu
      title="UI Kit"
      :collapsed="menuCollapsed"
      :menu-items="menuItems"
      @update:collapsed="menuCollapsed = $event"
    ></ui-menu>

    <!-- 右侧主区域 -->
    <div class="main-area">
      <div class="page-wrap">
        <router-view></router-view>
      </div>
    </div>
  </div>
</div>

<!-- ====== CDN ====== -->
<script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue-router@3.6.5/dist/vue-router.min.js"></script>
<script src="./lib/webpack-vue2-ui-lib.umd.min.js"></script>

<script>
(function() {
  var UI = window['webpack-vue2-ui-lib'];
  if (!UI) {
    document.body.innerHTML = '<h1 style="color:red;text-align:center;margin-top:60px;">❌ 加载失败：未找到 window["webpack-vue2-ui-lib"]<br><small>请先执行 npm run build:lib 构建组件库</small></h1>';
    return;
  }

  // 注册组件库（vue.config.js 中 libraryExport:'default' 让 UMD 全局直接指向 install 导出）
  Vue.use(UI);
  Vue.use(VueRouter);

  // ************ 共用方法 mixin ************
  var logMixin = {
    methods: {
      log: function(msg) {
        console.log('[test.html] ' + msg);
      }
    }
  };

  // ==================== Overview 首页 ====================
  var OverviewPage = {
    mixins: [logMixin],
    template: '<div>' +
      '<div class="page-header">' +
        '<h1>🧪 webpack-vue2-ui-lib 组件库测试</h1>' +
        '<p>引入 lib/webpack-vue2-ui-lib.umd.min.js + webpack-vue2-ui-lib.css | 左侧菜单切换页面</p>' +
        '<div class="current-route">📍 当前路由：{{ $route.path }}</div>' +
      '</div>' +
      '<div class="test-section">' +
        '<h2>组件一览</h2>' +
        '<p class="desc">共 4 个组件：UiButton / UiInput / UiDialog / UiMenu。点击左侧菜单查看各组件独立的 Demo 页面。</p>' +
        '<table>' +
          '<thead><tr><th>注册名</th><th>组件</th><th>demo 页面</th></tr></thead>' +
          '<tbody>' +
            '<tr><td>UiButton</td><td>按钮</td><td><router-link to="/button">/button →</router-link></td></tr>' +
            '<tr><td>UiInput</td><td>输入框</td><td><router-link to="/input">/input →</router-link></td></tr>' +
            '<tr><td>UiDialog</td><td>对话框</td><td><router-link to="/dialog">/dialog →</router-link></td></tr>' +
            '<tr><td>UiMenu</td><td>菜单</td><td>（即当前左侧菜单）</td></tr>' +
          '</tbody>' +
        '</table>' +
      '</div>' +
      '<div class="test-section">' +
        '<h2>快速验证</h2>' +
        '<p class="desc">几个按钮快速确认组件渲染正常：</p>' +
        '<div class="demo-row">' +
          '<ui-button type="primary" @click="log(\'主要按钮\')">主要</ui-button>' +
          '<ui-button type="success" @click="log(\'成功按钮\')">成功</ui-button>' +
          '<ui-button type="danger" @click="log(\'危险按钮\')">危险</ui-button>' +
          '<ui-button @click="log(\'默认按钮\')">默认</ui-button>' +
        '</div>' +
      '</div>' +
    '</div>'
  };

  // ==================== Button 页面 ====================
  var ButtonPage = {
    mixins: [logMixin],
    template: '<div>' +
      '<div class="page-header">' +
        '<h1>Button 按钮</h1>' +
        '<p>支持 type / size / disabled / loading / round / plain / icon 插槽</p>' +
      '</div>' +

      // 基础类型
      '<div class="test-section">' +
        '<h2>基础类型</h2>' +
        '<p class="desc">使用 <code>type</code> 属性：default / primary / success / warning / danger / info</p>' +
        '<div class="demo-row">' +
          '<ui-button @click="log(\'默认\')">默认按钮</ui-button>' +
          '<ui-button type="primary" @click="log(\'主要\')">主要按钮</ui-button>' +
          '<ui-button type="success">成功按钮</ui-button>' +
          '<ui-button type="warning">警告按钮</ui-button>' +
          '<ui-button type="danger">危险按钮</ui-button>' +
          '<ui-button type="info">信息按钮</ui-button>' +
        '</div>' +
      '</div>' +

      // 朴素
      '<div class="test-section">' +
        '<h2>朴素按钮 plain</h2>' +
        '<div class="demo-row">' +
          '<ui-button type="primary" plain>主要</ui-button>' +
          '<ui-button type="success" plain>成功</ui-button>' +
          '<ui-button type="warning" plain>警告</ui-button>' +
          '<ui-button type="danger" plain>危险</ui-button>' +
          '<ui-button type="info" plain>信息</ui-button>' +
        '</div>' +
      '</div>' +

      // 圆角
      '<div class="test-section">' +
        '<h2>圆角按钮 round</h2>' +
        '<div class="demo-row">' +
          '<ui-button type="primary" round>圆角</ui-button>' +
          '<ui-button type="success" round>圆角</ui-button>' +
          '<ui-button type="danger" round>圆角</ui-button>' +
        '</div>' +
      '</div>' +

      // 尺寸
      '<div class="test-section">' +
        '<h2>不同尺寸 size</h2>' +
        '<div class="demo-row">' +
          '<ui-button type="primary" size="small">小尺寸 small</ui-button>' +
          '<ui-button type="primary">默认尺寸 medium</ui-button>' +
          '<ui-button type="primary" size="large">大尺寸 large</ui-button>' +
        '</div>' +
      '</div>' +

      // 状态
      '<div class="test-section">' +
        '<h2>禁用 & 加载</h2>' +
        '<div class="demo-row">' +
          '<ui-button type="primary" disabled>禁用状态</ui-button>' +
          '<ui-button type="primary" loading>加载中</ui-button>' +
          '<ui-button disabled>默认禁用</ui-button>' +
        '</div>' +
      '</div>' +

      // 图标
      '<div class="test-section">' +
        '<h2>图标插槽</h2>' +
        '<div class="demo-row">' +
          '<ui-button type="primary"><template #icon>🔍</template>搜索</ui-button>' +
          '<ui-button type="success"><template #icon>✔</template>确认</ui-button>' +
          '<ui-button type="danger"><template #icon>🗑</template>删除</ui-button>' +
        '</div>' +
      '</div>' +

      // 事件
      '<div class="test-section">' +
        '<h2>点击事件</h2>' +
        '<div class="demo-row">' +
          '<ui-button type="primary" @click="log(\'按钮被点击 🎯\')">点我查看日志</ui-button>' +
        '</div>' +
      '</div>' +
    '</div>'
  };

  // ==================== Input 页面 ====================
  var InputPage = {
    data: function() {
      return {
        input1: '',
        input2: '',
        input3: '不可编辑',
        input4: '只读内容',
        input5: '',
        input6: '',
        input7: '',
        input8: '',
        input9: '',
        input10: '',
        inputError: '请输入正确的邮箱地址',
      };
    },
    methods: {
      toggleError: function() {
        this.inputError = this.inputError ? '' : '请输入正确的邮箱地址';
      }
    },
    template: '<div>' +
      '<div class="page-header">' +
        '<h1>Input 输入框</h1>' +
        '<p>支持 v-model / clearable / disabled / readonly / errorMsg / size / 前后缀插槽</p>' +
      '</div>' +

      // 基础用法
      '<div class="test-section">' +
        '<h2>基础用法</h2>' +
        '<p class="desc">使用 <code>v-model</code> 双向绑定输入值。</p>' +
        '<div class="demo-row demo-row--col">' +
          '<ui-input v-model="input1" placeholder="请输入内容" />' +
          '<p class="output">v-model 值：<code>{{ input1 || "(空)" }}</code></p>' +
        '</div>' +
      '</div>' +

      // 可清空
      '<div class="test-section">' +
        '<h2>可清空 clearable</h2>' +
        '<div class="demo-row demo-row--col">' +
          '<ui-input v-model="input2" placeholder="可清空输入框" clearable />' +
          '<p class="output">输入值：<code>{{ input2 || "(空)" }}</code></p>' +
        '</div>' +
      '</div>' +

      // 禁用 & 只读
      '<div class="test-section">' +
        '<h2>禁用 & 只读</h2>' +
        '<div class="demo-row demo-row--col">' +
          '<ui-input v-model="input3" placeholder="禁用状态" disabled />' +
          '<ui-input v-model="input4" placeholder="只读状态" readonly style="margin-top:10px" />' +
        '</div>' +
      '</div>' +

      // 错误提示
      '<div class="test-section">' +
        '<h2>错误提示 errorMsg</h2>' +
        '<div class="demo-row demo-row--col">' +
          '<ui-input v-model="input5" placeholder="邮箱地址" :error-msg="inputError" />' +
          '<p class="output">errorMsg：<code>{{ inputError || "(空)" }}</code></p>' +
          '<ui-button size="small" type="primary" style="margin-top:6px" @click="toggleError">' +
            '{{ inputError ? "清除错误" : "显示错误" }}' +
          '</ui-button>' +
        '</div>' +
      '</div>' +

      // 尺寸
      '<div class="test-section">' +
        '<h2>不同尺寸 size</h2>' +
        '<div class="demo-row demo-row--col">' +
          '<ui-input v-model="input6" size="small" placeholder="小尺寸 small" />' +
          '<ui-input v-model="input7" placeholder="默认尺寸 medium" style="margin-top:10px" />' +
          '<ui-input v-model="input8" size="large" placeholder="大尺寸 large" style="margin-top:10px" />' +
        '</div>' +
      '</div>' +

      // 前缀 & 后缀
      '<div class="test-section">' +
        '<h2>前缀 & 后缀插槽</h2>' +
        '<div class="demo-row demo-row--col">' +
          '<ui-input v-model="input9" placeholder="用户名"><template #prefix>👤</template></ui-input>' +
          '<ui-input v-model="input10" placeholder="搜索关键字" clearable style="margin-top:10px">' +
            '<template #prefix>🔍</template>' +
            '<template #suffix><span style="font-size:11px;color:#909399">⌘K</span></template>' +
          '</ui-input>' +
        '</div>' +
      '</div>' +
    '</div>'
  };

  // ==================== Dialog 页面 ====================
  var DialogPage = {
    mixins: [logMixin],
    data: function() {
      return {
        dialog1: false,
        dialog2: false,
        dialog3: false,
        dialog4: false,
        form: { name: '', email: '' },
        formError: '',
      };
    },
    methods: {
      submitForm: function() {
        if (!this.form.email) {
          this.formError = '请输入邮箱地址';
          return;
        }
        this.formError = '';
        this.log('提交表单: name=' + this.form.name + ', email=' + this.form.email);
        this.dialog2 = false;
        this.form = { name: '', email: '' };
      }
    },
    template: '<div>' +
      '<div class="page-header">' +
        '<h1>Dialog 对话框</h1>' +
        '<p>支持 visible.sync / 自定义内容 / footer 插槽 / 遮罩控制</p>' +
      '</div>' +

      // 基础用法
      '<div class="test-section">' +
        '<h2>基础用法</h2>' +
        '<p class="desc">使用 <code>:visible.sync</code> 控制对话框的显示与隐藏。</p>' +
        '<div class="demo-row">' +
          '<ui-button type="primary" @click="dialog1 = true">打开对话框</ui-button>' +
          '<span class="output">visible：<code>{{ dialog1 }}</code></span>' +
        '</div>' +
        '<ui-dialog :visible.sync="dialog1" title="操作确认" @close="log(\'对话框已关闭\')">' +
          '<p>确定要执行此操作吗？</p>' +
          '<p style="color:#909399;margin-top:8px;font-size:13px">此操作不可撤销，请谨慎操作。</p>' +
          '<template #footer>' +
            '<ui-button @click="dialog1 = false">取消</ui-button>' +
            '<ui-button type="primary" @click="dialog1 = false; log(\'确认操作已执行\')">确定</ui-button>' +
          '</template>' +
        '</ui-dialog>' +
      '</div>' +

      // 表单对话框
      '<div class="test-section">' +
        '<h2>自定义内容（表单）</h2>' +
        '<div class="demo-row">' +
          '<ui-button type="success" @click="dialog2 = true">表单对话框</ui-button>' +
        '</div>' +
        '<ui-dialog :visible.sync="dialog2" title="用户信息" width="420px">' +
          '<div class="form-row" style="margin-bottom:12px">' +
            '<span class="form-label">用户名：</span>' +
            '<ui-input v-model="form.name" placeholder="请输入用户名" />' +
          '</div>' +
          '<div class="form-row">' +
            '<span class="form-label">邮箱：</span>' +
            '<ui-input v-model="form.email" placeholder="请输入邮箱" :error-msg="formError" />' +
          '</div>' +
          '<template #footer>' +
            '<ui-button @click="dialog2 = false">取消</ui-button>' +
            '<ui-button type="primary" @click="submitForm">提交</ui-button>' +
          '</template>' +
        '</ui-dialog>' +
      '</div>' +

      // 宽对话框 & 无底部
      '<div class="test-section">' +
        '<h2>宽对话框 & 无底部</h2>' +
        '<div class="demo-row">' +
          '<ui-button type="warning" @click="dialog3 = true">宽对话框（680px）</ui-button>' +
        '</div>' +
        '<ui-dialog :visible.sync="dialog3" title="宽对话框" width="680px">' +
          '<p>适合展示表格或复杂内容。通过 <code>width</code> 属性设置宽度。</p>' +
          '<template #footer>' +
            '<ui-button type="primary" @click="dialog3 = false">知道了</ui-button>' +
          '</template>' +
        '</ui-dialog>' +
      '</div>' +

      // 禁用遮罩关闭
      '<div class="test-section">' +
        '<h2>禁用遮罩关闭</h2>' +
        '<p class="desc"><code>:close-on-click-overlay="false"</code>，只能通过按钮关闭。</p>' +
        '<div class="demo-row">' +
          '<ui-button type="danger" @click="dialog4 = true">不可遮罩关闭</ui-button>' +
        '</div>' +
        '<ui-dialog :visible.sync="dialog4" title="重要操作" :close-on-click-overlay="false">' +
          '<p style="color:#e6a23c">⚠ 此对话框无法通过点击遮罩层关闭，请点击按钮。</p>' +
          '<template #footer>' +
            '<ui-button type="primary" @click="dialog4 = false; log(\'已确认重要操作\')">我已知晓</ui-button>' +
          '</template>' +
        '</ui-dialog>' +
      '</div>' +

    '</div>'
  };

  // ==================== Menu 演示页面 ====================
  var MenuPage = {
    data: function() {
      return { menuCollapsed: false };
    },
    template: '<div>' +
      '<div class="page-header">' +
        '<h1>Menu 菜单</h1>' +
        '<p>固定左侧的侧边导航菜单，支持折叠/展开、路由联动</p>' +
      '</div>' +

      '<div class="test-section">' +
        '<h2>菜单状态</h2>' +
        '<p class="desc">控制左侧菜单折叠/展开以及菜单数据。</p>' +
        '<div class="demo-row">' +
          '<span class="demo-label">折叠控制：</span>' +
          '<ui-button size="small" @click="$root.menuCollapsed = !$root.menuCollapsed">' +
            '{{ $root.menuCollapsed ? "展开菜单" : "折叠菜单" }}' +
          '</ui-button>' +
          '<span class="output">collapsed = <span :class="\'status-badge \' + ($root.menuCollapsed ? \'status-badge--off\' : \'status-badge--on\')">' +
            '{{ $root.menuCollapsed }}' +
          '</span></span>' +
        '</div>' +
      '</div>' +

      '<div class="test-section">' +
        '<h2>菜单数据 menuItems</h2>' +
        '<table>' +
          '<thead><tr><th>label</th><th>path</th><th>icon</th><th>badge</th></tr></thead>' +
          '<tbody>' +
            '<tr v-for="item in $root.menuItems" :key="item.path">' +
              '<td>{{ item.label }}</td>' +
              '<td style="color:#409eff">{{ item.path }}</td>' +
              '<td>{{ item.icon }}</td>' +
              '<td>{{ item.badge || "—" }}</td>' +
            '</tr>' +
          '</tbody>' +
        '</table>' +
      '</div>' +

      '<div class="test-section">' +
        '<h2>导航测试</h2>' +
        '<p class="desc">点击菜单项，页面会通过 <code>&lt;router-view&gt;</code> 切换到对应 Demo。' +
        '当前路由：<code>{{ $route.path }}</code></p>' +
        '<div class="demo-row">' +
          '<ui-button type="primary" size="small" @click="$router.push(\'/overview\')">跳转到 Overview</ui-button>' +
          '<ui-button size="small" @click="$router.push(\'/button\')">跳转到 Button</ui-button>' +
          '<ui-button size="small" @click="$router.push(\'/input\')">跳转到 Input</ui-button>' +
          '<ui-button size="small" @click="$router.push(\'/dialog\')">跳转到 Dialog</ui-button>' +
        '</div>' +
      '</div>' +
    '</div>'
  };

  // ==================== Router ====================
  var router = new VueRouter({
    routes: [
      { path: '/',          redirect: '/overview' },
      { path: '/overview',  component: OverviewPage },
      { path: '/button',    component: ButtonPage },
      { path: '/input',     component: InputPage },
      { path: '/dialog',    component: DialogPage },
      { path: '/menu',      component: MenuPage },
    ]
  });

  // ==================== 根实例 ====================
  new Vue({
    router: router,
    el: '#app',

    data: {
      menuCollapsed: false,
      menuItems: [
        { label: '首页概览',     path: '/overview', icon: '🏠', badge: '' },
        { label: '按钮 Button',  path: '/button',   icon: '🔘', badge: 'new' },
        { label: '输入框 Input', path: '/input',    icon: '📝', badge: '' },
        { label: '对话框 Dialog',path: '/dialog',   icon: '💬', badge: 3 },
        { label: '菜单 Menu',    path: '/menu',     icon: '📋', badge: '' },
      ]
    }
  });
})();
</script>

</body>
</html>
